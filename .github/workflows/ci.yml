name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plugin-web-android:
    name: Plugin (Web + Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run eslint

      - name: Check formatting
        run: npm run prettier -- --check

      - name: Build plugin
        run: npm run build

      - name: Verify Android build/tests
        working-directory: android
        run: ./gradlew clean build test --no-daemon

  plugin-ios:
    name: Plugin (iOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify iOS build
        run: npm run verify:ios

  example-app-web-android:
    name: Example App (Web + Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            example-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install plugin dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Pack plugin tarball
        run: echo "PLUGIN_TGZ=$(npm pack --silent)" >> "$GITHUB_ENV"

      - name: Install example app dependencies
        working-directory: example-app
        run: npm ci

      - name: Install packaged plugin in example app
        working-directory: example-app
        run: npm install --no-save "../${PLUGIN_TGZ}"

      - name: Build example app web
        working-directory: example-app
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: example-app
        run: npx cap sync android

      - name: Build and unit test example app Android
        working-directory: example-app/android
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon
